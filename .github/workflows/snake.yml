name: Generate Pink Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LondonBella-cpu
          outputs: |
            dist/github-snake.svg?color_snake=ff69b4&color_dots=#ebedf0,#ffcce0,#ffb6c1,#ff69b4,#ff1493
            dist/github-snake-dark.svg?palette=github-dark&color_snake=ff69b4&color_dots=#161b22,#3d1f2d,#ff69b4,#ff1493,#c71585

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target_branch: output
          build_dir: dist
          commit_message: "update snake animation"
