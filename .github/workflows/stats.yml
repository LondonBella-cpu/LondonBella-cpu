name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/stats.yml

jobs:
  update:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download stats SVGs
        run: |
          curl -fsSL "https://github-readme-stats.shion.dev/api?username=LondonBella-cpu&show_icons=true&hide_border=true&bg_color=ffc0cb20&title_color=ff1493&text_color=555&icon_color=ff69b4&ring_color=ff69b4" -o assets/github-stats.svg
          curl -fsSL "https://streak-stats.demolab.com/?user=LondonBella-cpu&hide_border=true&background=ffc0cb20&ring=ff69b4&fire=ff1493&currStreakLabel=ff1493&sideLabels=555&dates=888" -o assets/github-streak.svg

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/github-streak.svg
          git diff --staged --quiet || git commit -m "Update GitHub stats SVGs"
          git push
