<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 235" role="img" aria-labelledby="title desc">
<title id="title">Profile focus areas</title>
<desc id="desc">Animated hand-drawn annotations for AI agents, browser extensions, OCR pipelines, and real workflow tools.</desc>
<metadata>Inspired by syabro/neat-annotations: https://github.com/syabro/neat-annotations</metadata>

<rect width="680" height="235" fill="#fffaf8"/>
<circle cx="56" cy="42" r="84" fill="#87ceeb" opacity=".12"/>
<circle cx="632" cy="190" r="96" fill="#ff69b4" opacity=".12"/>
<rect x="16" y="34" width="648" height="166" rx="20" fill="#fff" fill-opacity=".76" stroke="#ff9dcc" stroke-opacity=".5" stroke-width="1.5"/>

<g>
  <rect x="36" y="79" width="132" height="39" rx="7" fill="#f1ebfb" opacity=".55">
    <animate attributeName="opacity" values=".28;.75;.55" dur="3.6s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="102" y="107" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#2d2530">AI agents</text>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.08;.22;.88;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    <text x="36" y="63" fill="#8657c8" font-family="Comic Sans MS, Bradley Hand, cursive" font-size="16" font-weight="400" transform="rotate(-7 36 63)">experiments</text>
    <path stroke="#8657c8" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M98 55 C100 64 103 72 107 80">
      <animate attributeName="stroke-dashoffset" values="1;1;0;0;1" keyTimes="0;.1;.25;.88;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path stroke="#8657c8" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M99 74 L107 81 L113 71"/>
  </g>
</g>

<g>
  <rect x="196" y="79" width="248" height="39" rx="7" fill="#e9f1ff" opacity=".55">
    <animate attributeName="opacity" values=".28;.75;.55" dur="3.6s" begin=".6s" repeatCount="indefinite"/>
  </rect>
  <text x="320" y="107" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#2d2530">browser extensions</text>
