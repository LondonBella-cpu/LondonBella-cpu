<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 235" width="760" height="235" role="img" aria-labelledby="title desc">
<title id="title">Profile focus areas</title>
<desc id="desc">Animated hand-drawn annotations for AI agents, browser extensions, OCR pipelines, and real workflow tools.</desc>
<metadata>Inspired by syabro/neat-annotations: https://github.com/syabro/neat-annotations</metadata>

<rect width="760" height="235" fill="#fffaf8"/>
