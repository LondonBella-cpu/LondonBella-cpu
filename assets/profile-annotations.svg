<circle cx="708" cy="190" r="112" fill="#ff69b4" opacity=".12"/>
<rect x="24" y="34" width="712" height="166" rx="20" fill="#fff" fill-opacity=".76" stroke="#ff9dcc" stroke-opacity=".5" stroke-width="1.5"/>

<g>
