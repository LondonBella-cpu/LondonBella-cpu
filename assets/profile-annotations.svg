      <animate attributeName="stroke-dashoffset" values="1;1;0;0;1" keyTimes="0;.34;.5;.88;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path stroke="#d24f9f" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M441 179 L436 167 L449 169"/>
