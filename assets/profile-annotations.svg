    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.16;.32;.88;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    <text x="268" y="61" fill="#3b72c4" font-family="Comic Sans MS, Bradley Hand, cursive" font-size="16" font-weight="400" transform="rotate(3 268 61)">workflow tools</text>
    <path stroke="#3b72c4" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M388 55 C372 61 360 69 352 80">
      <animate attributeName="stroke-dashoffset" values="1;1;0;0;1" keyTimes="0;.18;.34;.88;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path stroke="#3b72c4" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M347 69 L352 81 L364 75"/>
  </g>
</g>

<g>
  <rect x="472" y="79" width="172" height="39" rx="7" fill="#eaf7ef" opacity=".55">
    <animate attributeName="opacity" values=".28;.75;.55" dur="3.6s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
  <text x="558" y="107" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#2d2530">OCR pipelines</text>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.24;.4;.88;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    <text x="500" y="148" fill="#2f8f5b" font-family="Comic Sans MS, Bradley Hand, cursive" font-size="15" font-weight="400" transform="rotate(-3 500 148)">document systems</text>
    <path stroke="#2f8f5b" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M552 135 C548 128 545 121 543 116">
      <animate attributeName="stroke-dashoffset" values="1;1;0;0;1" keyTimes="0;.26;.42;.88;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path stroke="#2f8f5b" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M535 124 L543 115 L550 125"/>
  </g>
</g>

<g>
  <rect x="198" y="146" width="284" height="35" rx="7" fill="#ffeaf4" opacity=".58">
    <animate attributeName="opacity" values=".32;.78;.58" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
  </rect>
  <text x="340" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#5a4d61">Building tools for real workflows</text>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.32;.48;.88;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    <text x="498" y="190" fill="#d24f9f" font-family="Comic Sans MS, Bradley Hand, cursive" font-size="16" font-weight="400" transform="rotate(3 498 190)">ship with care</text>
