<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 560" width="110" height="560" role="img" aria-label="cute side animals">
  <rect width="110" height="560" fill="#fffaf8"/>
  <!-- pink bow kitty -->
  <g transform="translate(14,16) scale(2.2)">
    <ellipse cx="14" cy="18" rx="12" ry="11" fill="#fff" stroke="#555" stroke-width="0.6"/>
    <ellipse cx="4" cy="10" rx="4" ry="5" fill="#fff" stroke="#555" stroke-width="0.5"/>
    <ellipse cx="24" cy="10" rx="4" ry="5" fill="#fff" stroke="#555" stroke-width="0.5"/>
    <ellipse cx="14" cy="8" rx="5" ry="3" fill="#ff69b4"/>
    <ellipse cx="10" cy="17" rx="1.2" ry="1.5" fill="#333"/><ellipse cx="18" cy="17" rx="1.2" ry="1.5" fill="#333"/>
  </g>
  <!-- shin-chan style boy -->
  <g transform="translate(10,108) scale(2.1)">
    <ellipse cx="14" cy="12" rx="9" ry="8" fill="#ffdbac" stroke="#555" stroke-width="0.4"/>
    <rect x="6" y="20" width="16" height="9" rx="2" fill="#e60026"/>
    <rect x="8" y="28" width="5" height="5" fill="#ffd93d"/><rect x="15" y="28" width="5" height="5" fill="#ffd93d"/>
    <ellipse cx="11" cy="11" rx="1" ry="1.2" fill="#333"/><ellipse cx="17" cy="11" rx="1" ry="1.2" fill="#333"/>
  </g>
  <!-- frog -->
  <g transform="translate(10,200) scale(2.1)">
    <ellipse cx="14" cy="20" rx="13" ry="10" fill="#6bcb77" stroke="#3d8b40" stroke-width="0.5"/>
    <circle cx="5" cy="10" r="6" fill="#fff" stroke="#3d8b40" stroke-width="0.4"/>
    <circle cx="23" cy="10" r="6" fill="#fff" stroke="#3d8b40" stroke-width="0.4"/>
    <circle cx="5" cy="10" r="2" fill="#333"/><circle cx="23" cy="10" r="2" fill="#333"/>
  </g>
  <!-- fox -->
  <g transform="translate(12,292) scale(2.1)">
    <ellipse cx="14" cy="18" rx="11" ry="10" fill="#ff9f43" stroke="#cc6a00" stroke-width="0.5"/>
    <polygon points="4,12 8,2 12,12" fill="#ff9f43"/><polygon points="24,12 20,2 16,12" fill="#ff9f43"/>
    <ellipse cx="14" cy="20" rx="7" ry="5" fill="#fff"/>
    <ellipse cx="10" cy="17" rx="1.2" ry="1.5" fill="#333"/><ellipse cx="18" cy="17" rx="1.2" ry="1.5" fill="#333"/>
  </g>
  <!-- panda -->
  <g transform="translate(10,384) scale(2.1)">
    <ellipse cx="14" cy="19" rx="12" ry="11" fill="#fff" stroke="#333" stroke-width="0.5"/>
    <circle cx="5" cy="9" r="5" fill="#333"/><circle cx="23" cy="9" r="5" fill="#333"/>
    <ellipse cx="10" cy="18" rx="2.5" ry="3" fill="#333"/><ellipse cx="18" cy="18" rx="2.5" ry="3" fill="#333"/>
    <ellipse cx="14" cy="22" rx="2" ry="1.5" fill="#333"/>
  </g>
  <!-- duck -->
  <g transform="translate(14,476) scale(2.1)">
    <ellipse cx="14" cy="18" rx="11" ry="9" fill="#ffd93d" stroke="#e6b800" stroke-width="0.5"/>
    <ellipse cx="20" cy="20" rx="4" ry="3" fill="#ff9f43"/>
    <ellipse cx="10" cy="16" rx="1.3" ry="1.6" fill="#333"/>
  </g>
</svg>
