<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 520" width="100" height="520" role="img" aria-label="side animals right">
  <rect width="100" height="520" fill="#fffaf8"/>
  <!-- pink bow kitty -->
  <g transform="translate(20,20)"><rect fill="#fff" stroke="#333" stroke-width=".4" x="4" y="8" width="18" height="16" rx="2"/><rect fill="#ff69b4" x="12" y="6" width="7" height="5"/><rect fill="#333" x="10" y="16" width="2" height="2"/><rect fill="#333" x="15" y="16" width="2" height="2"/></g>
  <!-- shin-chan style -->
  <g transform="translate(18,90)"><rect fill="#ffdbac" x="8" y="6" width="12" height="10" rx="2"/><rect fill="#e60026" x="6" y="16" width="16" height="8"/><rect fill="#333" x="11" y="10" width="2" height="2"/><rect fill="#333" x="15" y="10" width="2" height="2"/></g>
  <!-- frog -->
  <g transform="translate(16,160)"><rect fill="#6bcb77" x="4" y="10" width="18" height="12" rx="4"/><rect fill="#fff" x="2" y="6" width="7" height="7" rx="2"/><rect fill="#fff" x="17" y="6" width="7" height="7" rx="2"/></g>
  <!-- fox -->
  <g transform="translate(18,230)"><rect fill="#ff9f43" x="6" y="10" width="14" height="12" rx="2"/><polygon fill="#ff9f43" points="6,10 10,3 14,10"/><rect fill="#fff" x="10" y="14" width="6" height="4"/></g>
  <!-- panda -->
  <g transform="translate(16,300)"><rect fill="#fff" x="6" y="8" width="16" height="16" rx="3"/><rect fill="#333" x="2" y="6" width="7" height="7" rx="2"/><rect fill="#333" x="19" y="6" width="7" height="7" rx="2"/><rect fill="#333" x="10" y="14" width="3" height="3"/><rect fill="#333" x="15" y="14" width="3" height="3"/></g>
  <!-- chick -->
  <g transform="translate(22,370)"><rect fill="#ffd93d" x="5" y="10" width="12" height="10" rx="4"/><rect fill="#ff9f43" x="14" y="12" width="4" height="3"/></g>
  <!-- bear cub -->
  <g transform="translate(20,440)"><rect fill="#c68c53" x="6" y="10" width="14" height="12" rx="2"/><rect fill="#333" x="11" y="14" width="2" height="2"/><rect fill="#333" x="15" y="14" width="2" height="2"/></g>
</svg>
