<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 88" role="img" aria-label="cute animals divider">
  <defs>
    <style>
      .line { fill: #d0d7de; }
      .w { fill: #ffffff; stroke: #333; stroke-width: 0.5; }
      .pk { fill: #ff69b4; }
      .rd { fill: #e60026; }
      .og { fill: #ff9f43; }
      .br { fill: #c68c53; }
      .yl { fill: #ffd93d; }
      .bl { fill: #74b9ff; }
      .gn { fill: #6bcb77; }
      .bk { fill: #333333; }
      .sk { fill: #ffdbac; }
    </style>
  </defs>

  <!-- gray line -->
  <rect class="line" x="0" y="70" width="920" height="4" rx="2"/>

  <!-- Hello Kitty -->
  <g transform="translate(24,34)">
    <rect class="w" x="4" y="8" width="20" height="18" rx="3"/>
    <rect class="w" x="0" y="12" width="6" height="6"/><rect class="w" x="22" y="12" width="6" height="6"/>
    <rect class="rd" x="2" y="6" width="8" height="6"/>
    <rect class="bk" x="10" y="18" width="2" height="2"/><rect class="bk" x="16" y="18" width="2" height="2"/>
    <rect class="pk" x="12" y="22" width="4" height="2"/>
  </g>

  <!-- orange cat -->
  <g transform="translate(88,36)">
    <rect class="og" x="4" y="10" width="18" height="16" rx="3"/>
    <polygon class="og" points="4,10 8,2 12,10"/>
    <polygon class="og" points="20,10 18,2 14,10"/>
    <rect class="bk" x="10" y="18" width="2" height="2"/><rect class="bk" x="16" y="18" width="2" height="2"/>
    <rect class="pk" x="13" y="22" width="3" height="1"/>
  </g>

  <!-- shiba dog -->
  <g transform="translate(152,36)">
    <rect class="og" x="6" y="12" width="16" height="14" rx="3"/>
    <rect class="br" x="4" y="8" width="6" height="8"/><rect class="br" x="18" y="8" width="6" height="8"/>
    <rect class="bk" x="11" y="18" width="2" height="2"/><rect class="bk" x="17" y="18" width="2" height="2"/>
    <rect class="bk" x="14" y="22" width="2" height="2"/>
  </g>

  <!-- brown bear -->
  <g transform="translate(216,34)">
    <rect class="br" x="6" y="10" width="18" height="18" rx="4"/>
    <rect class="br" x="2" y="8" width="7" height="7" rx="2"/><rect class="br" x="21" y="8" width="7" height="7" rx="2"/>
    <rect class="bk" x="11" y="18" width="2" height="2"/><rect class="bk" x="17" y="18" width="2" height="2"/>
    <rect class="bk" x="13" y="22" width="4" height="2"/>
  </g>

  <!-- rabbit -->
  <g transform="translate(280,32)">
    <rect class="w" x="8" y="14" width="14" height="14" rx="3"/>
    <rect class="pk" x="8" y="0" width="4" height="14"/><rect class="pk" x="18" y="0" width="4" height="14"/>
    <rect class="bk" x="12" y="20" width="2" height="2"/><rect class="bk" x="17" y="20" width="2" height="2"/>
  </g>

  <!-- duck -->
  <g transform="translate(344,38)">
    <rect class="yl" x="6" y="12" width="16" height="12" rx="4"/>
    <rect class="og" x="18" y="16" width="6" height="4"/>
    <rect class="bk" x="11" y="16" width="2" height="2"/>
  </g>

  <!-- shin-chan style boy -->
  <g transform="translate(408,34)">
    <rect class="sk" x="8" y="8" width="14" height="12" rx="3"/>
    <rect class="rd" x="6" y="20" width="18" height="10"/>
    <rect class="yl" x="8" y="28" width="6" height="6"/><rect class="yl" x="16" y="28" width="6" height="6"/>
    <rect class="bk" x="12" y="12" width="2" height="2"/><rect class="bk" x="17" y="12" width="2" height="2"/>
    <rect class="pk" x="14" y="16" width="2" height="1"/>
  </g>

  <!-- mimmy / pink bow kitty -->
  <g transform="translate(472,34)">
    <rect class="w" x="4" y="8" width="20" height="18" rx="3"/>
    <rect class="w" x="0" y="12" width="6" height="6"/><rect class="w" x="22" y="12" width="6" height="6"/>
    <rect class="pk" x="14" y="6" width="8" height="6"/>
    <rect class="bk" x="10" y="18" width="2" height="2"/><rect class="bk" x="16" y="18" width="2" height="2"/>
    <rect class="pk" x="12" y="22" width="4" height="2"/>
  </g>

  <!-- penguin -->
  <g transform="translate(536,36)">
    <rect class="bl" x="6" y="10" width="16" height="16" rx="4"/>
    <rect class="w" x="10" y="14" width="8" height="10" rx="2"/>
    <rect class="bk" x="11" y="16" width="2" height="2"/><rect class="bk" x="15" y="16" width="2" height="2"/>
    <rect class="og" x="12" y="20" width="4" height="2"/>
  </g>

  <!-- frog -->
  <g transform="translate(600,36)">
    <rect class="gn" x="4" y="12" width="20" height="14" rx="5"/>
    <rect class="w" x="2" y="8" width="8" height="8" rx="3"/><rect class="w" x="18" y="8" width="8" height="8" rx="3"/>
    <rect class="bk" x="10" y="18" width="2" height="2"/><rect class="bk" x="16" y="18" width="2" height="2"/>
  </g>

  <!-- panda -->
  <g transform="translate(664,34)">
    <rect class="w" x="6" y="10" width="18" height="18" rx="4"/>
    <rect class="bk" x="2" y="8" width="8" height="8" rx="2"/><rect class="bk" x="20" y="8" width="8" height="8" rx="2"/>
    <rect class="bk" x="10" y="18" width="4" height="4"/><rect class="bk" x="16" y="18" width="4" height="4"/>
    <rect class="bk" x="13" y="24" width="4" height="2"/>
  </g>

  <!-- fox -->
  <g transform="translate(728,36)">
    <rect class="og" x="6" y="12" width="16" height="14" rx="3"/>
    <polygon class="og" points="6,12 10,4 14,12"/>
    <polygon class="og" points="22,12 18,4 14,12"/>
    <rect class="w" x="10" y="18" width="8" height="6"/>
    <rect class="bk" x="11" y="16" width="2" height="2"/><rect class="bk" x="15" y="16" width="2" height="2"/>
  </g>

  <!-- small bear cub -->
  <g transform="translate(792,38)">
    <rect class="br" x="6" y="12" width="14" height="12" rx="3"/>
    <rect class="br" x="4" y="10" width="5" height="5" rx="2"/><rect class="br" x="17" y="10" width="5" height="5" rx="2"/>
    <rect class="bk" x="10" y="16" width="2" height="2"/><rect class="bk" x="14" y="16" width="2" height="2"/>
  </g>

  <!-- puppy -->
  <g transform="translate(856,38)">
    <rect class="w" x="6" y="12" width="16" height="12" rx="3"/>
    <rect class="br" x="4" y="14" width="5" height="8" rx="2"/><rect class="br" x="19" y="14" width="5" height="8" rx="2"/>
    <rect class="bk" x="11" y="16" width="2" height="2"/><rect class="bk" x="15" y="16" width="2" height="2"/>
    <rect class="pk" x="13" y="20" width="2" height="1"/>
  </g>
</svg>
