<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 560" width="110" height="560" role="img" aria-label="cute side animals">
  <rect width="110" height="560" fill="#fffaf8"/>
  <!-- Hello Kitty -->
  <g transform="translate(14,16) scale(2.2)">
    <ellipse cx="14" cy="18" rx="12" ry="11" fill="#fff" stroke="#555" stroke-width="0.6"/>
    <ellipse cx="4" cy="10" rx="4" ry="5" fill="#fff" stroke="#555" stroke-width="0.5"/>
    <ellipse cx="24" cy="10" rx="4" ry="5" fill="#fff" stroke="#555" stroke-width="0.5"/>
    <ellipse cx="6" cy="8" rx="5" ry="3" fill="#e60026"/>
    <ellipse cx="10" cy="17" rx="1.2" ry="1.5" fill="#333"/><ellipse cx="18" cy="17" rx="1.2" ry="1.5" fill="#333"/>
    <ellipse cx="14" cy="21" rx="2" ry="1" fill="#ffb6c1"/>
  </g>
  <!-- cat -->
  <g transform="translate(12,108) scale(2.1)">
    <ellipse cx="14" cy="18" rx="11" ry="10" fill="#ff9f43" stroke="#cc6a00" stroke-width="0.5"/>
    <polygon points="4,12 8,2 12,12" fill="#ff9f43"/><polygon points="24,12 20,2 16,12" fill="#ff9f43"/>
    <ellipse cx="10" cy="17" rx="1.3" ry="1.6" fill="#333"/><ellipse cx="18" cy="17" rx="1.3" ry="1.6" fill="#333"/>
  </g>
  <!-- dog -->
  <g transform="translate(12,200) scale(2.1)">
    <ellipse cx="14" cy="18" rx="11" ry="10" fill="#f5c16c" stroke="#b8860b" stroke-width="0.5"/>
    <ellipse cx="5" cy="10" rx="5" ry="7" fill="#fff"/><ellipse cx="23" cy="10" rx="5" ry="7" fill="#fff"/>
    <ellipse cx="10" cy="17" rx="1.3" ry="1.6" fill="#333"/><ellipse cx="18" cy="17" rx="1.3" ry="1.6" fill="#333"/>
    <ellipse cx="14" cy="21" rx="2.5" ry="2" fill="#fff"/>
  </g>
  <!-- bear -->
  <g transform="translate(12,292) scale(2.1)">
    <ellipse cx="14" cy="19" rx="12" ry="11" fill="#c68c53" stroke="#8b5a2b" stroke-width="0.5"/>
    <circle cx="5" cy="9" r="5" fill="#c68c53"/><circle cx="23" cy="9" r="5" fill="#c68c53"/>
    <ellipse cx="10" cy="18" rx="1.3" ry="1.6" fill="#333"/><ellipse cx="18" cy="18" rx="1.3" ry="1.6" fill="#333"/>
  </g>
  <!-- rabbit -->
  <g transform="translate(16,384) scale(2.1)">
    <rect x="8" y="0" width="3" height="14" rx="1" fill="#ffb6c1"/><rect x="17" y="0" width="3" height="14" rx="1" fill="#ffb6c1"/>
    <ellipse cx="14" cy="20" rx="10" ry="9" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
    <ellipse cx="10" cy="19" rx="1.2" ry="1.5" fill="#333"/><ellipse cx="18" cy="19" rx="1.2" ry="1.5" fill="#333"/>
  </g>
  <!-- penguin -->
  <g transform="translate(14,476) scale(2.1)">
    <ellipse cx="14" cy="18" rx="11" ry="12" fill="#333"/>
    <ellipse cx="14" cy="19" rx="7" ry="9" fill="#fff"/>
    <ellipse cx="10" cy="16" rx="1.2" ry="1.5" fill="#333"/><ellipse cx="18" cy="16" rx="1.2" ry="1.5" fill="#333"/>
    <polygon points="14,20 12,23 16,23" fill="#ff9f43"/>
  </g>
</svg>
