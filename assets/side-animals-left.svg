<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 520" width="100" height="520" role="img" aria-label="side animals left">
  <rect width="100" height="520" fill="#fffaf8"/>
  <!-- hello kitty -->
  <g transform="translate(20,20)"><rect fill="#fff" stroke="#333" stroke-width=".4" x="4" y="8" width="18" height="16" rx="2"/><rect fill="#e60026" x="2" y="6" width="7" height="5"/><rect fill="#333" x="10" y="16" width="2" height="2"/><rect fill="#333" x="15" y="16" width="2" height="2"/></g>
  <!-- cat -->
  <g transform="translate(18,90)"><rect fill="#ff9f43" x="4" y="8" width="16" height="14" rx="2"/><rect fill="#333" x="10" y="14" width="2" height="2"/><rect fill="#333" x="15" y="14" width="2" height="2"/></g>
  <!-- bear -->
  <g transform="translate(16,160)"><rect fill="#c68c53" x="6" y="8" width="16" height="16" rx="3"/><rect fill="#c68c53" x="2" y="6" width="6" height="6" rx="2"/><rect fill="#c68c53" x="20" y="6" width="6" height="6" rx="2"/></g>
  <!-- rabbit -->
  <g transform="translate(20,230)"><rect fill="#ffb6c1" x="8" y="0" width="3" height="12"/><rect fill="#ffb6c1" x="16" y="0" width="3" height="12"/><rect fill="#fff" x="6" y="12" width="14" height="12" rx="2"/></g>
  <!-- duck -->
  <g transform="translate(22,300)"><rect fill="#ffd93d" x="4" y="8" width="14" height="10" rx="3"/><rect fill="#ff9f43" x="14" y="10" width="5" height="3"/></g>
  <!-- penguin -->
  <g transform="translate(18,370)"><rect fill="#74b9ff" x="6" y="6" width="14" height="14" rx="3"/><rect fill="#fff" x="10" y="10" width="6" height="8" rx="1"/></g>
  <!-- puppy -->
  <g transform="translate(20,440)"><rect fill="#fff" x="6" y="10" width="14" height="10" rx="2"/><rect fill="#c68c53" x="4" y="12" width="4" height="6" rx="1"/><rect fill="#c68c53" x="18" y="12" width="4" height="6" rx="1"/></g>
</svg>
