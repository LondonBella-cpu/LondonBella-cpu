<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Hello Kitty">
  <!-- face -->
  <ellipse cx="60" cy="68" rx="38" ry="34" fill="#ffffff" stroke="#666" stroke-width="1.5"/>
  <!-- ears -->
  <ellipse cx="28" cy="38" rx="14" ry="18" fill="#ffffff" stroke="#666" stroke-width="1.2"/>
  <ellipse cx="92" cy="38" rx="14" ry="18" fill="#ffffff" stroke="#666" stroke-width="1.2"/>
  <!-- red bow -->
  <ellipse cx="34" cy="30" rx="16" ry="10" fill="#e60026"/>
  <ellipse cx="22" cy="30" rx="8" ry="8" fill="#e60026"/>
  <ellipse cx="46" cy="30" rx="8" ry="8" fill="#e60026"/>
  <circle cx="34" cy="30" r="4" fill="#cc0020"/>
  <!-- eyes -->
  <ellipse cx="48" cy="66" rx="3" ry="4" fill="#222"/>
  <ellipse cx="72" cy="66" rx="3" ry="4" fill="#222"/>
  <!-- nose -->
  <ellipse cx="60" cy="74" rx="3" ry="2" fill="#ffd93d"/>
  <!-- whiskers -->
  <line x1="18" y1="68" x2="38" y2="66" stroke="#666" stroke-width="1.2"/>
  <line x1="18" y1="76" x2="38" y2="76" stroke="#666" stroke-width="1.2"/>
  <line x1="82" y1="66" x2="102" y2="68" stroke="#666" stroke-width="1.2"/>
  <line x1="82" y1="76" x2="102" y2="76" stroke="#666" stroke-width="1.2"/>
</svg>
